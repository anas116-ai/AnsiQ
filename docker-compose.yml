# ──────────────────────────────────────────────────────────────────────
# AnsiQ — Full Production Stack
# ──────────────────────────────────────────────────────────────────────
# Run: docker compose up -d
#
# Services:
#   app       → FastAPI (uvicorn)    :8000
#   dashboard → Streamlit            :8501
#   postgres  → PostgreSQL 16        :5432
#   redis     → Redis 7              :6379
#   nginx     → Reverse proxy        :80 / :443
#   prometheus→ Metrics              :9090
#   grafana   → Dashboards           :3000
# ──────────────────────────────────────────────────────────────────────

version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &restart-policy
  restart: unless-stopped

services:

  # ── FastAPI Application ──────────────────────────────────────────────
  app:
    <<: *restart-policy
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8000:8000"
    environment:
      ANSIQ_ENV: "${ANSIQ_ENV:-production}"
      ANSIQ_DB_HOST: postgres
      ANSIQ_DB_PORT: "5432"
      ANSIQ_DB_NAME: "${ANSIQ_DB_NAME:-ansiq}"
      ANSIQ_DB_USER: "${ANSIQ_DB_USER:-ansiq}"
      ANSIQ_DB_PASSWORD: "${ANSIQ_DB_PASSWORD:-ansiq}"
      ANSIQ_REDIS_HOST: redis
      ANSIQ_REDIS_PORT: "6379"
      ANSIQ_JWT_SECRET: "${ANSIQ_JWT_SECRET:-dev-jwt-secret-for-local-development-only}"
      ANSIQ_SECRET_KEY: "${ANSIQ_SECRET_KEY:-dev-app-secret-for-local-development-only}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      ANSIQ_CORS_ORIGINS: "${ANSIQ_CORS_ORIGINS:-*}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging

  # ── Streamlit Dashboard ──────────────────────────────────────────────
  dashboard:
    <<: *restart-policy
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    ports:
      - "8501:8501"
    environment:
      ANSIQ_ENV: "${ANSIQ_ENV:-production}"
      ANSIQ_API_URL: "http://app:8000"
    depends_on:
      - app
    logging: *default-logging

  # ── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    <<: *restart-policy
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "${ANSIQ_DB_NAME:-ansiq}"
      POSTGRES_USER: "${ANSIQ_DB_USER:-ansiq}"
      POSTGRES_PASSWORD: "${ANSIQ_DB_PASSWORD:-ansiq}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ansiq"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    <<: *restart-policy
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────
  nginx:
    <<: *restart-policy
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_data:/var/www/static:ro
    depends_on:
      - app
      - dashboard
    logging: *default-logging

  # ── Prometheus (optional monitoring) ──────────────────────────────────
  prometheus:
    <<: *restart-policy
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    profiles: ["monitoring"]
    logging: *default-logging

  # ── Grafana (optional dashboards) ────────────────────────────────────
  grafana:
    <<: *restart-policy
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
    profiles: ["monitoring"]
    depends_on:
      - prometheus
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  static_data:
  prometheus_data:
  grafana_data: