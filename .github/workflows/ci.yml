name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    continue-on-error: false
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ansiq_test
          POSTGRES_USER: ansiq
          POSTGRES_PASSWORD: ansiq
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ansiq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping"

    env:
      ANSIQ_ENV: development
      ANSIQ_DB_HOST: localhost
      ANSIQ_DB_PORT: "5432"
      ANSIQ_DB_NAME: ansiq_test
      ANSIQ_DB_USER: ansiq
      ANSIQ_DB_PASSWORD: ansiq
      ANSIQ_REDIS_HOST: localhost
      ANSIQ_REDIS_PORT: "6379"
      ANSIQ_JWT_SECRET: ci-test-secret-32-chars-minimum-padding
      ANSIQ_SECRET_KEY: ci-test-secret-32-chars-minimum-padding
      ANSIQ_CORS_ORIGINS: "*"
      ANSIQ_APP_URL: http://localhost:8000
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_test_ci_placeholder

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: false
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[saas,monitoring,dev]"

      - name: Lint with ruff
        run: |
          ruff check saas/ ansiq/
          ruff format --check saas/ ansiq/ || true

      - name: Type-check with mypy
        run: |
          mypy saas/ --ignore-missing-imports || true

      - name: Security scan with bandit
        run: |
          bandit -r saas/ -ll || true

      - name: Vulnerability scan with pip-audit
        run: |
          pip-audit || true

      - name: Run migrations
        run: |
          alembic upgrade head || echo "Migration skipped (DB may not be ready)"

      - name: Run audit
        run: |
          python check_audit.py

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        env:
          ANSIQ_JWT_SECRET: ci-test-secret-32-chars-minimum-padding
          ANSIQ_SECRET_KEY: ci-test-secret-32-chars-minimum-padding

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build --target production -t ansiq:${{ github.sha }} .
